<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCheck - إنشاء حساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        
        * {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(102, 126, 234, 0.5); }
            to { text-shadow: 0 0 20px rgba(102, 126, 234, 0.8), 0 0 30px rgba(102, 126, 234, 0.4); }
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.1);
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .input-field.error {
            border-color: #ef4444;
        }
        
        .input-field.success {
            border-color: #22c55e;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .link-text {
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .link-text:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.5s ease;
            display: none;
        }
        
        .toast-success {
            background: rgba(34, 197, 94, 0.9);
        }
        
        .toast-error {
            background: rgba(239, 68, 68, 0.9);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .lang-en {
            direction: ltr;
        }
        .lang-en * {
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        .lang-ar {
            direction: rtl;
        }
        .lang-ar * {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.1);
        }
        
        .password-strength.weak { background: #ef4444; width: 33%; }
        .password-strength.medium { background: #eab308; width: 66%; }
        .password-strength.strong { background: #22c55e; width: 100%; }
        
        .password-requirements {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        
        .password-requirements .valid {
            color: #22c55e;
        }
        
        .password-requirements .invalid {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div id="root" class="lang-ar">
        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
        
        <!-- Main Container -->
        <div class="w-full max-w-md px-4">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="ri-smartphone-line text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold glow">SmartCheck</h1>
                <p class="text-gray-400 mt-2" data-ar="منصة فحص الأجهزة الاحترافية" data-en="Professional Device Testing Platform">
                    منصة فحص الأجهزة الاحترافية
                </p>
            </div>
            
            <!-- Language Toggle -->
            <div class="flex justify-end mb-4">
                <button onclick="toggleLanguage()" class="text-gray-400 hover:text-white transition-colors flex items-center space-x-2 space-x-reverse">
                    <span id="langLabel">🇸🇦</span>
                    <span id="langText" class="text-sm">AR</span>
                </button>
            </div>
            
            <!-- Signup Card -->
            <div class="glass-effect rounded-2xl p-8">
                <h2 class="text-2xl font-bold mb-2" data-ar="إنشاء حساب جديد" data-en="Create Account">إنشاء حساب جديد</h2>
                <p class="text-gray-400 mb-6" data-ar="سجل للحصول على تجربة SmartCheck كاملة" data-en="Sign up for the full SmartCheck experience">
                    سجل للحصول على تجربة SmartCheck كاملة
                </p>
                
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="mb-4">
                        <label class="block text-gray-300 mb-2" data-ar="الاسم الكامل" data-en="Full Name">الاسم الكامل</label>
                        <input type="text" id="fullName" required 
                               placeholder="أدخل اسمك الكامل"
                               class="input-field">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-gray-300 mb-2" data-ar="اسم المستخدم" data-en="Username">اسم المستخدم</label>
                        <input type="text" id="signupUsername" required 
                               placeholder="أدخل اسم المستخدم"
                               class="input-field">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-gray-300 mb-2" data-ar="البريد الإلكتروني" data-en="Email">البريد الإلكتروني</label>
                        <input type="email" id="signupEmail" required 
                               placeholder="أدخل البريد الإلكتروني"
                               class="input-field">
                    </div>
                    
                    <div class="mb-2">
                        <label class="block text-gray-300 mb-2" data-ar="كلمة المرور" data-en="Password">كلمة المرور</label>
                        <input type="password" id="signupPassword" required 
                               placeholder="أدخل كلمة المرور (8 أحرف على الأقل)"
                               class="input-field"
                               oninput="checkPasswordStrength(this.value)">
                        <div class="password-strength" id="passwordStrength"></div>
                        <div class="password-requirements" id="passwordRequirements">
                            <span data-ar="• 8 أحرف على الأقل" data-en="• At least 8 characters">• 8 أحرف على الأقل</span>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-300 mb-2" data-ar="تأكيد كلمة المرور" data-en="Confirm Password">تأكيد كلمة المرور</label>
                        <input type="password" id="confirmPassword" required 
                               placeholder="أعد إدخال كلمة المرور"
                               class="input-field">
                    </div>
                    
                    <div class="mb-4">
                        <div class="flex items-center">
                            <input type="checkbox" id="agreeTerms" required class="w-4 h-4 rounded border-gray-600 bg-transparent">
                            <label for="agreeTerms" class="mr-2 text-sm text-gray-400">
                                <span data-ar="أوافق على" data-en="I agree to the">أوافق على</span>
                                <span class="link-text" data-ar="الشروط والأحكام" data-en="Terms & Conditions">الشروط والأحكام</span>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary" data-ar="إنشاء حساب" data-en="Create Account">
                        إنشاء حساب
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-400">
                        <span data-ar="لديك حساب بالفعل؟" data-en="Already have an account?">لديك حساب بالفعل؟</span>
                        <span class="link-text" onclick="goToLogin()" data-ar="تسجيل الدخول" data-en="Login">
                            تسجيل الدخول
                        </span>
                    </p>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="text-center mt-8">
                <p class="text-gray-500 text-sm">© 2026 SmartCheck. All rights reserved.</p>
            </div>
        </div>
    </div>
    
    <script>
        let currentLang = localStorage.getItem('smartcheck_lang') || 'ar';
        
        // ============ Language Functions ============
        function toggleLanguage() {
            const root = document.getElementById('root');
            const langLabel = document.getElementById('langLabel');
            const langText = document.getElementById('langText');
            
            if (currentLang === 'ar') {
                currentLang = 'en';
                root.className = 'lang-en';
                langText.textContent = 'AR';
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                currentLang = 'ar';
                root.className = 'lang-ar';
                langText.textContent = 'EN';
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            }
            
            localStorage.setItem('smartcheck_lang', currentLang);
            
            document.querySelectorAll('[data-ar][data-en]').forEach(el => {
                if (currentLang === 'ar') {
                    el.textContent = el.getAttribute('data-ar');
                } else {
                    el.textContent = el.getAttribute('data-en');
                }
            });
        }
        
        function loadLanguage() {
            const root = document.getElementById('root');
            const langLabel = document.getElementById('langLabel');
            const langText = document.getElementById('langText');
            
            if (currentLang === 'en') {
                root.className = 'lang-en';
                langText.textContent = 'AR';
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                root.className = 'lang-ar';
                langText.textContent = 'EN';
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            }
            
            document.querySelectorAll('[data-ar][data-en]').forEach(el => {
                if (currentLang === 'ar') {
                    el.textContent = el.getAttribute('data-ar');
                } else {
                    el.textContent = el.getAttribute('data-en');
                }
            });
        }
        
        // ============ Toast Notification ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // ============ Password Strength ============
        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('passwordStrength');
            const requirements = document.getElementById('passwordRequirements');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            strengthBar.className = 'password-strength';
            
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                return;
            }
            
            if (strength <= 2) {
                strengthBar.classList.add('weak');
                requirements.innerHTML = `<span class="invalid">${currentLang === 'ar' ? '🔴 كلمة مرور ضعيفة' : '🔴 Weak password'}</span>`;
            } else if (strength <= 3) {
                strengthBar.classList.add('medium');
                requirements.innerHTML = `<span class="valid">${currentLang === 'ar' ? '🟡 كلمة مرور متوسطة' : '🟡 Medium password'}</span>`;
            } else {
                strengthBar.classList.add('strong');
                requirements.innerHTML = `<span class="valid">${currentLang === 'ar' ? '🟢 كلمة مرور قوية' : '🟢 Strong password'}</span>`;
            }
        }
        
        // ============ Navigation ============
        function goToLogin() {
            window.location.href = '/login';
        }
        
        function goToDashboard() {
            window.location.href = '/index';
        }
        
        // ============ Signup Handler ============
        async function handleSignup(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // Validation
            if (!fullName || !username || !email || !password) {
                showToast(
                    currentLang === 'ar' ? 'الرجاء ملء جميع الحقول' : 'Please fill all fields',
                    'error'
                );
                return;
            }
            
            if (password.length < 8) {
                showToast(
                    currentLang === 'ar' ? 'كلمة المرور يجب أن تكون 8 أحرف على الأقل' : 'Password must be at least 8 characters',
                    'error'
                );
                return;
            }
            
            if (password !== confirmPassword) {
                showToast(
                    currentLang === 'ar' ? 'كلمات المرور غير متطابقة' : 'Passwords do not match',
                    'error'
                );
                return;
            }
            
            if (!agreeTerms) {
                showToast(
                    currentLang === 'ar' ? 'يرجى الموافقة على الشروط والأحكام' : 'Please agree to the Terms & Conditions',
                    'error'
                );
                return;
            }
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fullName, username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(
                        currentLang === 'ar' ? '✅ تم إنشاء الحساب بنجاح! مرحباً ' + fullName : '✅ Account created successfully! Welcome ' + fullName,
                        'success'
                    );
                    
                    // Auto login after signup
                    setTimeout(async () => {
                        const loginResponse = await fetch('/api/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ username, password })
                        });
                        
                        const loginData = await loginResponse.json();
                        if (loginData.success) {
                            localStorage.setItem('smartcheck_token', loginData.token);
                            localStorage.setItem('smartcheck_user', JSON.stringify(loginData.user));
                            localStorage.setItem('smartcheck_username', fullName);
                            goToDashboard();
                        }
                    }, 1500);
                } else {
                    showToast(
                        currentLang === 'ar' ? '❌ ' + (data.error || 'فشل إنشاء الحساب') : '❌ ' + (data.error || 'Signup failed'),
                        'error'
                    );
                }
            } catch (error) {
                console.error('Signup error:', error);
                showToast(
                    currentLang === 'ar' ? '❌ خطأ في الاتصال بالسيرفر' : '❌ Server connection error',
                    'error'
                );
            }
        }
        
        // ============ Check if already logged in ============
        function checkAuth() {
            const token = localStorage.getItem('smartcheck_token');
            if (token) {
                window.location.href = '/index';
            }
        }
        
        // ============ Initialize ============
        document.addEventListener('DOMContentLoaded', function() {
            loadLanguage();
            checkAuth();
        });
    </script>
</body>
</html>
