<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCheck - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        
        * {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 10% 20%, rgba(102, 126, 234, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(118, 75, 162, 0.05) 0%, transparent 50%);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            to { text-shadow: 0 0 40px rgba(102, 126, 234, 0.6), 0 0 60px rgba(118, 75, 162, 0.3); }
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px 18px;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 14px;
            padding: 16px;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        
        .btn-primary:hover::after {
            left: 100%;
        }
        
        .link-text {
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .link-text:hover {
            color: #8b7cf7;
            text-decoration: underline;
        }
        
        .forgot-password {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .forgot-password:hover {
            color: #667eea;
        }
        
        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 16px 28px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.5s ease;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .toast-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        
        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .lang-en {
            direction: ltr;
        }
        .lang-en * {
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        .lang-ar {
            direction: rtl;
        }
        .lang-ar * {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
        }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }
        
        .social-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .social-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="root" class="lang-ar">
        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
        
        <!-- Main Container -->
        <div class="w-full max-w-md px-4">
            <!-- Logo -->
            <div class="text-center mb-10">
                <div class="logo-icon gradient-bg">
                    <i class="ri-smartphone-line text-white text-3xl"></i>
                </div>
                <h1 class="text-4xl font-extrabold glow">SmartCheck</h1>
                <p class="text-gray-400 mt-2 text-sm" data-ar="منصة فحص الأجهزة الاحترافية" data-en="Professional Device Testing Platform">
                    منصة فحص الأجهزة الاحترافية
                </p>
            </div>
            
            <!-- Language Toggle -->
            <div class="flex justify-end mb-4">
                <button onclick="toggleLanguage()" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                    <span id="langLabel">🇸🇦</span>
                    <span id="langText" class="font-medium">AR</span>
                </button>
            </div>
            
            <!-- Login Card -->
            <div class="glass-effect rounded-2xl p-8">
                <h2 class="text-2xl font-bold mb-2" data-ar="مرحباً بعودتك 👋" data-en="Welcome Back 👋">مرحباً بعودتك 👋</h2>
                <p class="text-gray-400 mb-8 text-sm" data-ar="سجل الدخول للوصول إلى لوحة التحكم" data-en="Login to access your dashboard">
                    سجل الدخول للوصول إلى لوحة التحكم
                </p>
                
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-gray-300 mb-2 text-sm font-medium" data-ar="اسم المستخدم" data-en="Username">اسم المستخدم</label>
                        <input type="text" id="loginUsername" required 
                               placeholder="أدخل اسم المستخدم"
                               class="input-field">
                    </div>
                    
                    <div class="mb-2">
                        <label class="block text-gray-300 mb-2 text-sm font-medium" data-ar="كلمة المرور" data-en="Password">كلمة المرور</label>
                        <input type="password" id="loginPassword" required 
                               placeholder="أدخل كلمة المرور"
                               class="input-field">
                    </div>
                    
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-gray-600 bg-transparent accent-purple-500">
                            <label for="rememberMe" class="text-sm text-gray-400 cursor-pointer" data-ar="تذكرني" data-en="Remember me">تذكرني</label>
                        </div>
                        <span class="forgot-password text-sm" onclick="showForgotPassword()" data-ar="نسيت كلمة المرور؟" data-en="Forgot password?">
                            نسيت كلمة المرور؟
                        </span>
                    </div>
                    
                    <button type="submit" class="btn-primary" data-ar="تسجيل الدخول" data-en="Login">
                        <i class="ri-login-box-line ml-2"></i>
                        تسجيل الدخول
                    </button>
                </form>
                
                <div class="divider">
                    <span class="text-xs text-gray-500">أو</span>
                </div>
                
                <div class="flex gap-3">
                    <button class="social-btn flex-1">
                        <i class="ri-google-fill text-red-400"></i>
                        Google
                    </button>
                    <button class="social-btn flex-1">
                        <i class="ri-apple-fill text-white"></i>
                        Apple
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-400 text-sm">
                        <span data-ar="ليس لديك حساب؟" data-en="Don't have an account?">ليس لديك حساب؟</span>
                        <span class="link-text" onclick="goToSignup()" data-ar="إنشاء حساب جديد" data-en="Create account">
                            إنشاء حساب جديد
                        </span>
                    </p>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="text-center mt-8">
                <p class="text-gray-500 text-xs">© 2026 SmartCheck. All rights reserved.</p>
            </div>
        </div>
    </div>
    
    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="glass-effect rounded-2xl p-8 max-w-sm w-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold" data-ar="نسيت كلمة المرور" data-en="Forgot Password">نسيت كلمة المرور</h2>
                <button onclick="closeForgotModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="ri-close-line text-2xl"></i>
                </button>
            </div>
            <div class="text-center">
                <div class="w-20 h-20 gradient-bg rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ri-customer-service-2-fill text-white text-3xl"></i>
                </div>
                <p class="text-gray-300 mb-2" data-ar="للتواصل والدعم الفني" data-en="For technical support contact">للتواصل والدعم الفني</p>
                <p class="text-2xl font-bold text-white mb-3">📞 01274445091</p>
                <p class="text-gray-400 text-sm" data-ar="يرجى الاتصال بهذا الرقم للحصول على المساعدة" data-en="Please call this number for assistance">
                    يرجى الاتصال بهذا الرقم للحصول على المساعدة
                </p>
                <button onclick="closeForgotModal()" class="mt-6 btn-primary" data-ar="فهمت" data-en="Got it">
                    فهمت
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let currentLang = localStorage.getItem('smartcheck_lang') || 'ar';
        
        // ============ Language Functions ============
        function toggleLanguage() {
            const root = document.getElementById('root');
            const langLabel = document.getElementById('langLabel');
            const langText = document.getElementById('langText');
            
            if (currentLang === 'ar') {
                currentLang = 'en';
                root.className = 'lang-en';
                langText.textContent = 'AR';
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                currentLang = 'ar';
                root.className = 'lang-ar';
                langText.textContent = 'EN';
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            }
            
            localStorage.setItem('smartcheck_lang', currentLang);
            
            document.querySelectorAll('[data-ar][data-en]').forEach(el => {
                if (currentLang === 'ar') {
                    el.textContent = el.getAttribute('data-ar');
                } else {
                    el.textContent = el.getAttribute('data-en');
                }
            });
        }
        
        function loadLanguage() {
            const root = document.getElementById('root');
            const langLabel = document.getElementById('langLabel');
            const langText = document.getElementById('langText');
            
            if (currentLang === 'en') {
                root.className = 'lang-en';
                langText.textContent = 'AR';
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                root.className = 'lang-ar';
                langText.textContent = 'EN';
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            }
            
            document.querySelectorAll('[data-ar][data-en]').forEach(el => {
                if (currentLang === 'ar') {
                    el.textContent = el.getAttribute('data-ar');
                } else {
                    el.textContent = el.getAttribute('data-en');
                }
            });
        }
        
        // ============ Toast Notification ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // ============ Navigation ============
        function goToSignup() {
            window.location.href = '/signup';
        }
        
        function goToDashboard() {
            window.location.href = '/home';
        }
        
        // ============ Forgot Password ============
        function showForgotPassword() {
            document.getElementById('forgotModal').classList.remove('hidden');
        }
        
        function closeForgotModal() {
            document.getElementById('forgotModal').classList.add('hidden');
        }
        
        // ============ Login Handler ============
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !password) {
                showToast(
                    currentLang === 'ar' ? '⚠️ الرجاء ملء جميع الحقول' : '⚠️ Please fill all fields',
                    'error'
                );
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('smartcheck_token', data.token);
                    localStorage.setItem('smartcheck_user', JSON.stringify(data.user));
                    localStorage.setItem('smartcheck_username', username);
                    
                    showToast(
                        currentLang === 'ar' ? `✅ مرحباً ${username}!` : `✅ Welcome ${username}!`,
                        'success'
                    );
                    
                    setTimeout(() => {
                        goToDashboard();
                    }, 1000);
                } else {
                    showToast(
                        currentLang === 'ar' ? `❌ ${data.error || 'فشل تسجيل الدخول'}` : `❌ ${data.error || 'Login failed'}`,
                        'error'
                    );
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast(
                    currentLang === 'ar' ? '❌ خطأ في الاتصال بالسيرفر' : '❌ Server connection error',
                    'error'
                );
            }
        }
        
        // ============ Check if already logged in ============
        function checkAuth() {
            const token = localStorage.getItem('smartcheck_token');
            if (token) {
                window.location.href = '/home';
            }
        }
        
        // ============ Initialize ============
        document.addEventListener('DOMContentLoaded', function() {
            loadLanguage();
            checkAuth();
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
